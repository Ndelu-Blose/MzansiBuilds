name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    env:
      REACT_APP_SUPABASE_URL: https://ci-placeholder.supabase.co
      REACT_APP_SUPABASE_ANON_KEY: ci-placeholder-anon-key-for-build-only
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: ESLint
        run: npm run lint --prefix frontend

      - name: Unit tests (Jest)
        run: CI=true npm test --prefix frontend -- --watchAll=false

      - name: Production build
        run: npm run build --prefix frontend

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r backend/requirements.txt
          python -m pip install ruff

      - name: Ruff
        working-directory: backend
        run: python -m ruff check .

      - name: Flake8
        working-directory: backend
        run: python -m flake8 .

      - name: Pytest
        working-directory: backend
        run: python -m pytest tests -q

  e2e:
    needs: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke tests
        working-directory: frontend
        env:
          CI: true
        run: npx playwright test

  deploy:
    needs: [frontend, backend, e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "DEPLOY_HOOK_URL not set; skipping deploy."
            exit 0
          fi
          curl -fsS -X POST "$DEPLOY_HOOK_URL"
